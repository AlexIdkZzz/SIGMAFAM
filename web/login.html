<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - SIGMAFAM</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <div class="title">SIGMAFAM</div>
          <div class="subtitle">Iniciar sesión</div>
        </div>
      </div>

      <div id="msg" class="msg"></div>

      <label class="label">Correo</label>
      <input class="input" id="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email">

      <label class="label">Contraseña</label>
      <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">

      <button class="btn" id="btnLogin">Entrar</button>

      <div class="links">
        <a href="register.html">Crear cuenta</a>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
