<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro - SIGMAFAM</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <div class="title">SIGMAFAM</div>
          <div class="subtitle">Crear cuenta</div>
        </div>
      </div>

      <div id="msg" class="msg"></div>

      <label class="label">Nombre</label>
      <input class="input" id="name" type="text" placeholder="Tu nombre" autocomplete="name">

      <label class="label">Correo</label>
      <input class="input" id="email" type="email" placeholder="correo@ejemplo.com" autocomplete="email">

      <label class="label">Contraseña</label>
      <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="new-password">

      <button class="btn" id="btnRegister">Registrarme</button>

      <div class="links">
        <a href="login.html">Ya tengo cuenta</a>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
